<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>WhatTalk — Animation Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --black:     #0A0A0A;
      --teal:      #00C2A8;
      --teal-dim:  rgba(0,194,168,0.12);
      --teal-glow: rgba(0,194,168,0.25);
      --purple:    #7855FF;
      --white:     #FFFFFF;
      --grey:      #888888;
      --border:    #1E1E1E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      background: var(--black);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ── Background — appears instantly, no animation ── */
    .bg-blob-1 {
      position: absolute;
      width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(120,85,255,0.20) 0%, transparent 65%);
      top: -200px; left: -300px;
      filter: blur(100px);
      pointer-events: none;
    }
    .bg-blob-2 {
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(0,194,168,0.15) 0%, transparent 65%);
      bottom: 300px; right: -200px;
      filter: blur(110px);
      pointer-events: none;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    /* ── Animation keyframe ── */
    @keyframes revealUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate {
      opacity: 0;
      animation: revealUp 0.5s ease-out forwards;
    }

    /* ── Safe zone ── */
    .safe-zone {
      position: absolute;
      top: 285px;
      left: 0;
      width: 1080px;
      height: 1350px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 56px;
      padding: 80px 100px;
    }

    /* ── Element 1: Logo ── */
    .logo-wrap {
      animation-delay: 0s;
    }

    /* ── Element 2: Headline ── */
    .headline {
      text-align: center;
      animation-delay: 0.8s;
    }
    .headline h1 {
      font-size: 80px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    .headline h1 em {
      font-style: italic;
      color: var(--teal);
    }

    /* ── Element 3: Subtext ── */
    .subtext {
      text-align: center;
      animation-delay: 1.6s;
    }
    .subtext p {
      font-size: 30px;
      font-weight: 400;
      color: var(--grey);
      line-height: 1.55;
      letter-spacing: -0.01em;
    }

    /* ── Element 4: CTA ── */
    .cta-wrap {
      animation-delay: 2.4s;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--teal);
      color: var(--black);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.01em;
      padding: 28px 60px;
      border-radius: 100px;
    }

    /* ── Logo bottom ── */
    .logo-bottom {
      position: absolute;
      bottom: 60px;
      left: 0;
      width: 1080px;
      display: flex;
      justify-content: center;
      animation-delay: 2.4s;
    }
  </style>
  <style>
    #export-btn {
      display: block;
      width: 1080px;
      padding: 18px;
      background: #7855FF;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    #export-btn:hover { background: #6644ee; }
    #export-btn:disabled { background: #444; cursor: wait; }
  </style>
</head>
<body>
  <button id="export-btn" onclick="exportMP4()">⬇ MP4 olarak indir</button>
  <script>
    function exportMP4() {
      const btn = document.getElementById('export-btn');
      btn.disabled = true;

      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,10,10,0.93);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;font-family:Inter,sans-serif;';
      overlay.innerHTML = `
        <div id="ov-title" style="font-size:20px;font-weight:700;color:#00C2A8;letter-spacing:-0.02em;">⚙ MP4 Hazırlanıyor...</div>
        <div id="ov-log" style="font-size:13px;color:#888;max-width:440px;text-align:center;line-height:1.6;word-break:break-all;min-height:40px;"></div>
        <div style="font-size:12px;color:#444;">Bu pencereyi kapatmayın · ~2 dakika sürebilir</div>
      `;
      document.body.appendChild(overlay);

      const logEl = document.getElementById('ov-log');
      const titleEl = document.getElementById('ov-title');

      const es = new EventSource('http://localhost:3131/export?file=outputs%2Fanimation-test.html');

      es.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'log') {
          logEl.textContent = d.msg.replace(/\s+/g, ' ').trim();
        } else if (d.type === 'done') {
          es.close();
          titleEl.textContent = '✓ MP4 Hazır!';
          logEl.style.color = '#00C2A8';
          logEl.textContent = 'İndirme başlıyor...';
          setTimeout(() => {
            window.location.href = 'http://localhost:3131/download?file=' + encodeURIComponent(d.file);
            setTimeout(() => {
              document.body.removeChild(overlay);
              btn.disabled = false;
            }, 2000);
          }, 600);
        } else if (d.type === 'error') {
          es.close();
          titleEl.style.color = '#EF4444';
          titleEl.textContent = '✗ Export Başarısız';
          logEl.style.color = '#EF4444';
          logEl.textContent = d.msg;
          setTimeout(() => { document.body.removeChild(overlay); btn.disabled = false; }, 4000);
        }
      };

      es.onerror = () => {
        es.close();
        titleEl.style.color = '#EF4444';
        titleEl.textContent = '✗ Bağlantı Hatası';
        logEl.style.color = '#EF4444';
        logEl.textContent = 'Sunucuya bağlanılamadı. Terminalde: node .claude/server.js';
        setTimeout(() => { document.body.removeChild(overlay); btn.disabled = false; }, 4000);
      };
    }
  </script>

    <!-- Element 2: Headline (delay 0.8s) -->
    <div class="headline animate" style="animation-delay: 0.8s;">
      <h1>Her Memnun Müşteri<br><em>3 Yeni Müşteri</em> Getirebilir.</h1>
